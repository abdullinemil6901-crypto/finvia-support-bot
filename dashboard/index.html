<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #12121a;
            --border: rgba(255,255,255,0.06);
            --text: #fff;
            --text-muted: #666;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --green: #22c55e;
            --yellow: #eab308;
            --red: #ef4444;
            --radius: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 32px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .logo h1 {
            font-size: 1.4rem;
            font-weight: 600;
        }

        .logo span {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .refresh-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            border-color: var(--accent);
        }

        .refresh-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Stats Grid */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .stat-card:hover {
            border-color: var(--accent);
        }

        .stat-card.active {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.1);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
        }

        .stat-card.total .stat-value { color: var(--accent); }
        .stat-card.open .stat-value { color: var(--yellow); }
        .stat-card.progress .stat-value { color: #06b6d4; }
        .stat-card.closed .stat-value { color: var(--green); }

        /* Main Layout */
        .main {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 24px;
        }

        /* Tickets Section */
        .tickets-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .section-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-title {
            font-size: 1rem;
            font-weight: 600;
        }

        .ticket-count {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Search */
        .search-bar {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
        }

        .search-input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        /* Tickets Table */
        .tickets-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .ticket-item {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.15s;
        }

        .ticket-item:hover {
            background: rgba(255,255,255,0.02);
        }

        .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .ticket-id {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent);
        }

        .ticket-status {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        .status-open {
            background: rgba(234, 179, 8, 0.15);
            color: var(--yellow);
        }

        .status-progress {
            background: rgba(6, 182, 212, 0.15);
            color: #06b6d4;
        }

        .status-closed {
            background: rgba(34, 197, 94, 0.15);
            color: var(--green);
        }

        .ticket-label {
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .ticket-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            gap: 16px;
        }

        /* Pagination */
        .pagination {
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border);
        }

        .page-info {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .page-buttons {
            display: flex;
            gap: 8px;
        }

        .page-btn {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .page-btn:hover:not(:disabled) {
            border-color: var(--accent);
        }

        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Sidebar */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chart-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
        }

        .chart-title {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .chart-container {
            height: 200px;
        }

        /* Duty */
        .duty-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
        }

        .duty-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .duty-name {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .duty-time {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Loading */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            color: var(--text-muted);
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--red);
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 24px;
            display: none;
        }

        /* Responsive */
        @media (max-width: 1100px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            .main { grid-template-columns: 1fr; }
            .sidebar { flex-direction: row; flex-wrap: wrap; }
            .sidebar > * { flex: 1; min-width: 280px; }
        }

        @media (max-width: 600px) {
            body { padding: 16px; }
            .stats { grid-template-columns: 1fr; }
            .header { flex-direction: column; gap: 16px; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="error-msg" id="error"></div>

    <div class="header">
        <div class="logo">
            <div class="logo-icon">📋</div>
            <div>
                <h1>Support Dashboard</h1>
                <span>Управление тикетами</span>
            </div>
        </div>
        <button class="refresh-btn" id="refreshBtn" onclick="loadData()">
            <span>↻</span> Обновить
        </button>
    </div>

    <!-- Stats Cards -->
    <div class="stats">
        <div class="stat-card total" onclick="filterByStatus('')">
            <div class="stat-label">Всего тикетов</div>
            <div class="stat-value" id="total">—</div>
        </div>
        <div class="stat-card open" onclick="filterByStatus('open')">
            <div class="stat-label">Открытые</div>
            <div class="stat-value" id="open">—</div>
        </div>
        <div class="stat-card progress" onclick="filterByStatus('in_progress')">
            <div class="stat-label">В работе</div>
            <div class="stat-value" id="in_progress">—</div>
        </div>
        <div class="stat-card closed" onclick="filterByStatus('closed')">
            <div class="stat-label">Закрытые</div>
            <div class="stat-value" id="closed">—</div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main">
        <!-- Tickets -->
        <div class="tickets-section">
            <div class="section-header">
                <span class="section-title">Тикеты</span>
                <span class="ticket-count" id="ticketCount">0 тикетов</span>
            </div>
            <div class="search-bar">
                <input type="text" class="search-input" id="searchInput" placeholder="Поиск по ID, трейдеру..." oninput="handleSearch()">
            </div>
            <div class="tickets-list" id="ticketsList">
                <div class="loading">Загрузка...</div>
            </div>
            <div class="pagination">
                <span class="page-info" id="pageInfo">Страница 1 из 1</span>
                <div class="page-buttons">
                    <button class="page-btn" id="prevBtn" onclick="changePage(-1)">←</button>
                    <button class="page-btn" id="nextBtn" onclick="changePage(1)">→</button>
                </div>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="chart-card">
                <div class="chart-title">По категориям</div>
                <div class="chart-container">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <div class="chart-title">За 7 дней</div>
                <div class="chart-container">
                    <canvas id="daysChart"></canvas>
                </div>
            </div>
            <div class="duty-card">
                <div class="duty-label">Дежурный</div>
                <div class="duty-name" id="dutyName">—</div>
                <div class="duty-time" id="dutyTime">—</div>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://finvia-support-bot-production.up.railway.app';

        // State
        let tickets = [];
        let summary = null;
        let currentPage = 1;
        const perPage = 15;
        let currentStatus = '';
        let searchTimeout = null;
        let categoryChart = null;
        let daysChart = null;

        // Load all data
        async function loadData() {
            const btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            showError('');

            try {
                const [summaryData, ticketsData] = await Promise.all([
                    fetch(`${API}/api/summary`).then(r => r.json()),
                    fetch(`${API}/api/tickets?page=1&per_page=100`).then(r => r.json())
                ]);

                summary = summaryData;
                tickets = ticketsData.tickets || [];

                renderStats(summary);
                renderChart(summary);
                renderTickets();
                updateDuty(summary);
            } catch (e) {
                showError('Ошибка загрузки: ' + e.message);
            } finally {
                btn.disabled = false;
            }
        }

        // Render stats
        function renderStats(data) {
            document.getElementById('total').textContent = data.total || 0;
            document.getElementById('open').textContent = data.open || 0;
            document.getElementById('in_progress').textContent = data.in_progress || 0;
            document.getElementById('closed').textContent = data.closed || 0;
        }

        // Render chart
        function renderChart(data) {
            const labels = (data.by_label || []).map(l => l.label);
            const values = (data.by_label || []).map(l => l.count);

            // Category chart
            const ctx1 = document.getElementById('categoryChart').getContext('2d');
            if (categoryChart) categoryChart.destroy();

            categoryChart = new Chart(ctx1, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: ['#6366f1', '#22c55e', '#eab308', '#ef4444', '#a855f7', '#06b6d4'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '65%',
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: { color: '#666', padding: 8, font: { size: 11 } }
                        }
                    }
                }
            });

            // Days chart
            const ctx2 = document.getElementById('daysChart').getContext('2d');
            if (daysChart) daysChart.destroy();

            const days = (data.by_day || []).map(d => {
                const date = new Date(d.day);
                return date.toLocaleDateString('ru', { day: 'numeric', month: 'short' });
            });
            const dayValues = (data.by_day || []).map(d => d.count);

            daysChart = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: days,
                    datasets: [{
                        data: dayValues,
                        backgroundColor: 'rgba(99, 102, 241, 0.7)',
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false }, ticks: { color: '#666' } },
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#666' } }
                    }
                }
            });
        }

        // Render tickets
        function renderTickets() {
            const list = document.getElementById('ticketsList');
            let filtered = tickets;

            // Filter by status
            if (currentStatus) {
                filtered = filtered.filter(t => t.status === currentStatus);
            }

            // Filter by search
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            if (search) {
                filtered = filtered.filter(t =>
                    String(t.id).includes(search) ||
                    (t.trader_username || '').toLowerCase().includes(search) ||
                    (t.label || '').toLowerCase().includes(search) ||
                    (t.taken_by || '').toLowerCase().includes(search)
                );
            }

            // Pagination
            const totalPages = Math.ceil(filtered.length / perPage) || 1;
            const start = (currentPage - 1) * perPage;
            const page = filtered.slice(start, start + perPage);

            if (!page.length) {
                list.innerHTML = '<div class="loading">Нет тикетов</div>';
            } else {
                list.innerHTML = page.map(t => {
                    const statusClass = t.status === 'open' ? 'status-open' :
                                       t.status === 'in_progress' ? 'status-progress' : 'status-closed';
                    const statusText = t.status === 'open' ? 'Открыт' :
                                      t.status === 'in_progress' ? 'В работе' : 'Закрыт';
                    const date = t.created_at ? new Date(t.created_at).toLocaleDateString('ru', {
                        day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
                    }) : '—';

                    return `<div class="ticket-item">
                        <div class="ticket-header">
                            <span class="ticket-id">#${t.id}</span>
                            <span class="ticket-status ${statusClass}">${statusText}</span>
                        </div>
                        <div class="ticket-label">${t.label || '—'}</div>
                        <div class="ticket-meta">
                            <span>@${t.trader_username || t.trader_id || '—'}</span>
                            <span>${date}</span>
                            ${t.taken_by ? `<span>👤 ${t.taken_by}</span>` : ''}
                        </div>
                    </div>`;
                }).join('');
            }

            // Update pagination
            document.getElementById('ticketCount').textContent = `${filtered.length} тикетов`;
            document.getElementById('pageInfo').textContent = `Страница ${currentPage} из ${totalPages}`;
            document.getElementById('prevBtn').disabled = currentPage <= 1;
            document.getElementById('nextBtn').disabled = currentPage >= totalPages;
        }

        // Update duty
        function updateDuty(data) {
            const duty = data.current_duty;
            document.getElementById('dutyName').textContent = duty || 'Не назначен';
            document.getElementById('dutyTime').textContent = new Date().toLocaleTimeString('ru', {
                hour: '2-digit', minute: '2-digit'
            }) + ' МСК';
        }

        // Filter by status
        function filterByStatus(status) {
            currentStatus = status;
            currentPage = 1;

            // Update active state
            document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active'));
            if (status) {
                event.currentTarget.classList.add('active');
            }

            renderTickets();
        }

        // Search
        function handleSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                currentPage = 1;
                renderTickets();
            }, 300);
        }

        // Pagination
        function changePage(dir) {
            let filtered = tickets;
            if (currentStatus) {
                filtered = filtered.filter(t => t.status === currentStatus);
            }

            const totalPages = Math.ceil(filtered.length / perPage) || 1;
            const newPage = currentPage + dir;

            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                renderTickets();
            }
        }

        // Show error
        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = msg ? 'block' : 'none';
        }

        // Init
        loadData();
    </script>
</body>
</html>
