<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Hub — Finavia</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ══════════════════════════════════════════════════════════════
           DESIGN TOKENS — Уникальная цветовая система
           ══════════════════════════════════════════════════════════════ */
        :root {
            /* Основная палитра — глубокий космический чёрный с акцентами */
            --bg-primary: #08080c;
            --bg-secondary: #0d0d14;
            --bg-card: #12121a;
            --bg-elevated: #181822;
            --bg-hover: #1e1e2a;

            /* Градиенты акцентов */
            --accent-primary: #00d4aa;
            --accent-secondary: #00a8ff;
            --accent-gradient: linear-gradient(135deg, #00d4aa 0%, #00a8ff 100%);

            /* Нейтральные */
            --text-primary: #f0f0f5;
            --text-secondary: #8a8a9a;
            --text-muted: #5a5a6a;

            /* Статусные */
            --status-open: #fbbf24;
            --status-progress: #3b82f6;
            --status-closed: #10b981;

            /* Границы и разделители */
            --border-subtle: rgba(255, 255, 255, 0.04);
            --border-accent: rgba(0, 212, 170, 0.15);

            /* Эффекты */
            --glow-accent: 0 0 40px rgba(0, 212, 170, 0.15);
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.4);
            --shadow-float: 0 8px 32px rgba(0, 0, 0, 0.5);

            /* Скругления */
            --radius-xs: 6px;
            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 28px;
        }

        /* ══════════════════════════════════════════════════════════════
           RESET & BASE
           ══════════════════════════════════════════════════════════════ */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            font-size: 14px;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* ══════════════════════════════════════════════════════════════
           AMBIENT BACKGROUND — Живые градиентные пятна
           ══════════════════════════════════════════════════════════════ */
        .ambient-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            animation: float 20s ease-in-out infinite;
        }

        .ambient-orb--1 {
            width: 600px;
            height: 600px;
            background: var(--accent-primary);
            top: -200px;
            left: -200px;
            animation-delay: 0s;
        }

        .ambient-orb--2 {
            width: 500px;
            height: 500px;
            background: var(--accent-secondary);
            bottom: -150px;
            right: -150px;
            animation-delay: -10s;
        }

        .ambient-orb--3 {
            width: 300px;
            height: 300px;
            background: #8b5cf6;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 30px) scale(1.02); }
        }

        /* ══════════════════════════════════════════════════════════════
           LAYOUT
           ══════════════════════════════════════════════════════════════ */
        .app {
            position: relative;
            z-index: 1;
            max-width: 1440px;
            margin: 0 auto;
            padding: 32px 40px;
        }

        /* ══════════════════════════════════════════════════════════════
           HEADER — Минималистичный с эффектом glass
           ══════════════════════════════════════════════════════════════ */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 48px;
            padding: 20px 28px;
            background: rgba(18, 18, 26, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-xl);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .brand-logo {
            width: 52px;
            height: 52px;
            background: var(--accent-gradient);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--glow-accent);
        }

        .brand-logo svg {
            width: 28px;
            height: 28px;
            color: #fff;
        }

        .brand-text h1 {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .brand-text span {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        .header-meta {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 100px;
            font-size: 0.8rem;
            color: #10b981;
            font-weight: 500;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .refresh-btn {
            width: 44px;
            height: 44px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .refresh-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--border-accent);
        }

        .refresh-btn svg {
            width: 20px;
            height: 20px;
        }

        /* ══════════════════════════════════════════════════════════════
           STATS GRID — KPI карточки
           ══════════════════════════════════════════════════════════════ */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            padding: 24px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent-gradient);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .stat-card:hover {
            border-color: var(--border-accent);
            transform: translateY(-2px);
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-card__label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }

        .stat-card__value {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 4px;
        }

        .stat-card__trend {
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-card__trend--up { color: #10b981; }
        .stat-card__trend--down { color: #ef4444; }

        .stat-card__icon {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(0, 212, 170, 0.1);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-primary);
        }

        /* ══════════════════════════════════════════════════════════════
           MAIN GRID — Основной контент
           ══════════════════════════════════════════════════════════════ */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 28px;
        }

        /* ══════════════════════════════════════════════════════════════
           TICKETS SECTION
           ══════════════════════════════════════════════════════════════ */
        .tickets-section {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            font-weight: 600;
        }

        .section-title svg {
            width: 20px;
            height: 20px;
            color: var(--accent-primary);
        }

        .section-badge {
            padding: 4px 10px;
            background: rgba(0, 212, 170, 0.1);
            border-radius: 100px;
            font-size: 0.75rem;
            color: var(--accent-primary);
            font-weight: 600;
        }

        .filters {
            display: flex;
            gap: 12px;
        }

        .filter-select {
            padding: 8px 14px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-select:hover {
            border-color: var(--border-accent);
            color: var(--text-primary);
        }

        /* ══════════════════════════════════════════════════════════════
           TICKET CARDS — Премиум карточки тикетов
           ══════════════════════════════════════════════════════════════ */
        .tickets-list {
            max-height: 600px;
            overflow-y: auto;
            padding: 16px;
        }

        .tickets-list::-webkit-scrollbar {
            width: 6px;
        }

        .tickets-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .tickets-list::-webkit-scrollbar-thumb {
            background: var(--bg-hover);
            border-radius: 3px;
        }

        .ticket-card {
            padding: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
        }

        .ticket-card:hover {
            background: var(--bg-elevated);
            border-color: var(--border-accent);
            transform: translateX(4px);
        }

        .ticket-card:last-child {
            margin-bottom: 0;
        }

        .ticket-card__header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .ticket-card__id {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: 'Outfit', monospace;
        }

        .ticket-card__status {
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .ticket-card__status--open {
            background: rgba(251, 191, 36, 0.15);
            color: var(--status-open);
        }

        .ticket-card__status--progress {
            background: rgba(59, 130, 246, 0.15);
            color: var(--status-progress);
        }

        .ticket-card__status--closed {
            background: rgba(16, 185, 129, 0.15);
            color: var(--status-closed);
        }

        .ticket-card__title {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ticket-card__meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .ticket-card__meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ticket-card__meta-item svg {
            width: 14px;
            height: 14px;
            opacity: 0.7;
        }

        .ticket-card__actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-subtle);
        }

        .ticket-action-btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .ticket-action-btn--take {
            background: rgba(0, 212, 170, 0.15);
            color: var(--accent-primary);
        }

        .ticket-action-btn--take:hover {
            background: rgba(0, 212, 170, 0.25);
        }

        .ticket-action-btn--close {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .ticket-action-btn--close:hover {
            background: rgba(239, 68, 68, 0.25);
        }

        .ticket-action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ══════════════════════════════════════════════════════════════
           SIDEBAR
           ══════════════════════════════════════════════════════════════ */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* ══════════════════════════════════════════════════════════════
           DUTY CARD — Карточка дежурного
           ══════════════════════════════════════════════════════════════ */
        .duty-card {
            padding: 24px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            position: relative;
            overflow: hidden;
        }

        .duty-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(0, 212, 170, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        .duty-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
        }

        .duty-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .duty-shift {
            padding: 4px 12px;
            background: rgba(0, 212, 170, 0.1);
            border-radius: 100px;
            font-size: 0.75rem;
            color: var(--accent-primary);
            font-weight: 600;
        }

        .duty-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }

        .duty-time {
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            position: relative;
        }

        .duty-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 16px;
            position: relative;
        }

        .duty-select {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .duty-select:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .duty-buttons {
            display: flex;
            gap: 10px;
            position: relative;
        }

        .duty-assign-btn {
            flex: 1;
            padding: 12px;
            background: var(--accent-gradient);
            border: none;
            border-radius: var(--radius-sm);
            color: #fff;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .duty-assign-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--glow-accent);
        }

        .duty-switch-btn {
            flex: 1;
            padding: 12px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .duty-switch-btn:hover {
            border-color: var(--border-accent);
            color: var(--text-primary);
        }

        /* ══════════════════════════════════════════════════════════════
           SCHEDULE CARD — Расписание
           ══════════════════════════════════════════════════════════════ */
        .schedule-card {
            padding: 24px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
        }

        .schedule-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .schedule-title {
            font-size: 1rem;
            font-weight: 600;
        }

        .schedule-nav {
            display: flex;
            gap: 8px;
        }

        .schedule-nav-btn {
            width: 36px;
            height: 36px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-xs);
            color: var(--text-secondary);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .schedule-nav-btn:hover {
            background: var(--bg-elevated);
            border-color: var(--border-accent);
            color: var(--text-primary);
        }

        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .schedule-day {
            padding: 12px 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .schedule-day:hover {
            background: var(--bg-elevated);
            border-color: var(--border-accent);
        }

        .schedule-day--today {
            border-color: var(--accent-primary);
            background: rgba(0, 212, 170, 0.05);
        }

        .schedule-day__name {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .schedule-day__date {
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .schedule-day--today .schedule-day__date {
            color: var(--accent-primary);
        }

        .schedule-shifts {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .schedule-shift {
            font-size: 0.65rem;
            padding: 2px 4px;
            border-radius: 3px;
        }

        .schedule-shift--day {
            background: rgba(251, 191, 36, 0.15);
            color: var(--status-open);
        }

        .schedule-shift--night {
            background: rgba(139, 92, 246, 0.15);
            color: #a78bfa;
        }

        /* ══════════════════════════════════════════════════════════════
           CHART CARDS
           ══════════════════════════════════════════════════════════════ */
        .chart-card {
            padding: 24px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .chart-title {
            font-size: 1rem;
            font-weight: 600;
        }

        .chart-total {
            padding: 4px 10px;
            background: rgba(0, 212, 170, 0.1);
            border-radius: 100px;
            font-size: 0.8rem;
            color: var(--accent-primary);
            font-weight: 600;
        }

        .chart-container {
            height: 200px;
            position: relative;
        }

        /* ══════════════════════════════════════════════════════════════
           TOAST & MODAL
           ══════════════════════════════════════════════════════════════ */
        .toast {
            position: fixed;
            bottom: 32px;
            right: 32px;
            padding: 16px 24px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-accent);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-float);
            z-index: 1000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast--success {
            border-color: rgba(16, 185, 129, 0.3);
        }

        .toast--error {
            border-color: rgba(239, 68, 68, 0.3);
        }

        /* ══════════════════════════════════════════════════════════════
           EMPTY STATE
           ══════════════════════════════════════════════════════════════ */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 0.95rem;
        }

        /* ══════════════════════════════════════════════════════════════
           LOADING
           ══════════════════════════════════════════════════════════════ */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border-subtle);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ══════════════════════════════════════════════════════════════
           RESPONSIVE
           ══════════════════════════════════════════════════════════════ */
        @media (max-width: 1200px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .main-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .app { padding: 16px; }
            .header { flex-direction: column; gap: 16px; }
            .stats-grid { grid-template-columns: 1fr; }
            .filters { flex-wrap: wrap; }
            .schedule-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>
    <!-- Ambient Background -->
    <div class="ambient-bg">
        <div class="ambient-orb ambient-orb--1"></div>
        <div class="ambient-orb ambient-orb--2"></div>
        <div class="ambient-orb ambient-orb--3"></div>
    </div>

    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="brand">
                <div class="brand-logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                </div>
                <div class="brand-text">
                    <h1>Support Hub</h1>
                    <span>Finavia Platform</span>
                </div>
            </div>
            <div class="header-meta">
                <div class="live-badge">
                    <span class="live-dot"></span>
                    <span>Live</span>
                </div>
                <button class="refresh-btn" onclick="loadData()" title="Обновить">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6M1 20v-6h6"/>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-card__label">Всего тикетов</div>
                <div class="stat-card__value" id="statTotal">—</div>
                <div class="stat-card__trend">
                    <span id="statTotalTrend">📈 За всё время</span>
                </div>
                <div class="stat-card__icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14,2 14,8 20,8"/>
                    </svg>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-card__label">Открытые</div>
                <div class="stat-card__value" id="statOpen">—</div>
                <div class="stat-card__trend stat-card__trend--up" id="statOpenTrend">⚡ Требуют внимания</div>
                <div class="stat-card__icon" style="background: rgba(251, 191, 36, 0.1); color: var(--status-open);">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-card__label">В работе</div>
                <div class="stat-card__value" id="statProgress">—</div>
                <div class="stat-card__trend" id="statProgressTrend">🔄 Активные</div>
                <div class="stat-card__icon" style="background: rgba(59, 130, 246, 0.1); color: var(--status-progress);">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23,4 23,10 17,10"/>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                    </svg>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-card__label">Закрытые</div>
                <div class="stat-card__value" id="statClosed">—</div>
                <div class="stat-card__trend stat-card__trend--up" id="statClosedTrend">✅ Завершено</div>
                <div class="stat-card__icon" style="background: rgba(16, 185, 129, 0.1); color: var(--status-closed);">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                        <polyline points="22,4 12,14.01 9,11.01"/>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Main Grid -->
        <div class="main-grid">
            <!-- Tickets Section -->
            <div class="tickets-section">
                <div class="section-header">
                    <div class="section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                            <line x1="9" y1="9" x2="15" y2="15"/>
                            <line x1="15" y1="9" x2="9" y2="15"/>
                        </svg>
                        <span>Тикеты</span>
                        <span class="section-badge" id="ticketCount">0</span>
                    </div>
                    <div class="filters">
                        <select class="filter-select" id="statusFilter" onchange="filterTickets()">
                            <option value="">Все статусы</option>
                            <option value="open">Открытые</option>
                            <option value="in_progress">В работе</option>
                            <option value="closed">Закрытые</option>
                        </select>
                        <select class="filter-select" id="supportFilter" onchange="filterBySupport()">
                            <option value="">Все саппорты</option>
                        </select>
                    </div>
                </div>
                <div class="tickets-list" id="ticketsList">
                    <div class="loading"><div class="spinner"></div>Загрузка...</div>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="sidebar">
                <!-- Duty Card -->
                <div class="duty-card">
                    <div class="duty-header">
                        <span class="duty-label">Дежурный сейчас</span>
                        <span class="duty-shift" id="dutyShiftBadge">—</span>
                    </div>
                    <div class="duty-name" id="dutyName">—</div>
                    <div class="duty-time">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <polyline points="12,6 12,12 16,14"/>
                        </svg>
                        <span id="dutyTime">— МСК</span>
                    </div>
                    <div class="duty-controls">
                        <select class="duty-select" id="dutySupportSelect">
                            <option value="">Выберите саппорта...</option>
                        </select>
                        <select class="duty-select" id="dutyShiftSelect">
                            <option value="day">☀️ Дневная (09:00–21:00)</option>
                            <option value="night">🌙 Ночная (21:00–09:00)</option>
                        </select>
                    </div>
                    <div class="duty-buttons">
                        <button class="duty-assign-btn" onclick="assignDuty()">✓ Назначить</button>
                        <button class="duty-switch-btn" onclick="switchDuty()">🔄 Сменить</button>
                    </div>
                </div>

                <!-- Charts -->
                <div class="chart-card">
                    <div class="chart-header">
                        <span class="chart-title">По категориям</span>
                        <span class="chart-total" id="chartTotal">0</span>
                    </div>
                    <div class="chart-container">
                        <canvas id="categoryChart"></canvas>
                    </div>
                </div>

                <div class="chart-card">
                    <div class="chart-header">
                        <span class="chart-title">За 7 дней</span>
                        <span class="chart-total" id="chartWeekTotal">0</span>
                    </div>
                    <div class="chart-container">
                        <canvas id="daysChart"></canvas>
                    </div>
                </div>

                <!-- Schedule -->
                <div class="schedule-card">
                    <div class="schedule-header">
                        <span class="schedule-title">Расписание</span>
                        <div class="schedule-nav">
                            <button class="schedule-nav-btn" onclick="changeWeek(-1)">←</button>
                            <button class="schedule-nav-btn" onclick="changeWeek(1)">→</button>
                        </div>
                    </div>
                    <div class="schedule-grid" id="scheduleGrid">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        const API = 'https://finvia-support-bot-production.up.railway.app';
        let tickets = [];
        let supports = [];
        let weekOffset = 0;
        let currentStatus = '';
        let currentSupport = '';
        let categoryChart = null;
        let daysChart = null;

        // ─── API ───────────────────────────────────────────────
        async function loadData() {
            try {
                const [summary, ticketsData, schedule, stats, supportsData] = await Promise.all([
                    fetch(`${API}/api/summary`).then(r => r.json()),
                    fetch(`${API}/api/tickets?page=1&per_page=100`).then(r => r.json()),
                    fetch(`${API}/api/schedule?offset=${weekOffset}`).then(r => r.json()),
                    fetch(`${API}/api/stats`).then(r => r.json()),
                    fetch(`${API}/api/supports`).then(r => r.json())
                ]);

                tickets = ticketsData.tickets || [];
                supports = supportsData || [];

                updateStats(summary);
                renderTickets();
                renderSchedule(schedule);
                renderCharts(summary, stats);
                renderSupportFilter();
            } catch (e) {
                showError('Ошибка загрузки данных');
            }
        }

        function updateStats(data) {
            document.getElementById('statTotal').textContent = data.total || 0;
            document.getElementById('statOpen').textContent = data.open || 0;
            document.getElementById('statProgress').textContent = data.in_progress || 0;
            document.getElementById('statClosed').textContent = data.closed || 0;

            // Duty
            if (data.current_duty) {
                document.getElementById('dutyName').textContent = data.current_duty;
            }
            const hour = new Date().getHours();
            document.getElementById('dutyShiftBadge').textContent = hour >= 9 && hour < 21 ? '☀️ День' : '🌙 Ночь';
        }

        function renderTickets() {
            const list = document.getElementById('ticketsList');
            const filtered = tickets.filter(t => {
                if (currentStatus && t.status !== currentStatus) return false;
                if (currentSupport && t.taken_by !== currentSupport) return false;
                return true;
            });

            document.getElementById('ticketCount').textContent = filtered.length;

            if (!filtered.length) {
                list.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg><p>Тикеты не найдены</p></div>';
                return;
            }

            list.innerHTML = filtered.map(t => {
                const statusClass = t.status === 'open' ? 'ticket-card__status--open' :
                                   t.status === 'in_progress' ? 'ticket-card__status--progress' :
                                   'ticket-card__status--closed';
                const statusText = t.status === 'open' ? 'Открыт' :
                                  t.status === 'in_progress' ? 'В работе' : 'Закрыт';
                const created = new Date(t.created_at).toLocaleDateString('ru-RU');

                const takeBtn = t.status === 'open' ?
                    `<button class="ticket-action-btn ticket-action-btn--take" onclick="takeTicket(${t.id}); event.stopPropagation();">✓ Взять</button>` : '';
                const closeBtn = t.status !== 'closed' ?
                    `<button class="ticket-action-btn ticket-action-btn--close" onclick="closeTicket(${t.id}); event.stopPropagation();">🏁 Закрыть</button>` : '';

                return `
                    <div class="ticket-card">
                        <div class="ticket-card__header">
                            <span class="ticket-card__id">#${t.id}</span>
                            <span class="ticket-card__status ${statusClass}">${statusText}</span>
                        </div>
                        <div class="ticket-card__title">${t.label || 'Обращение'}</div>
                        <div class="ticket-card__meta">
                            <span class="ticket-card__meta-item">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                @${t.trader_username || 'unknown'}
                            </span>
                            <span class="ticket-card__meta-item">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                                ${created}
                            </span>
                            ${t.taken_by ? `<span class="ticket-card__meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20,6 9,17 4,12"/></svg>@${t.taken_by}</span>` : ''}
                        </div>
                        ${(takeBtn || closeBtn) ? `<div class="ticket-card__actions">${takeBtn}${closeBtn}</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        function renderSchedule(data) {
            const grid = document.getElementById('scheduleGrid');
            const week = data.week || [];
            const dayNames = { Mon: 'Пн', Tue: 'Вт', Wed: 'Ср', Thu: 'Чт', Fri: 'Пт', Sat: 'Сб', Sun: 'Вс' };

            grid.innerHTML = week.map(day => {
                const isToday = day.is_today ? 'schedule-day--today' : '';
                return `
                    <div class="schedule-day ${isToday}">
                        <div class="schedule-day__name">${dayNames[day.day_name] || day.day_name}</div>
                        <div class="schedule-day__date">${day.day_label}</div>
                        <div class="schedule-shifts">
                            <span class="schedule-shift ${day.day?.length ? 'schedule-shift--day' : ''}">☀️ ${day.day?.[0] || '—'}</span>
                            <span class="schedule-shift ${day.night?.length ? 'schedule-shift--night' : ''}">🌙 ${day.night?.[0] || '—'}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderCharts(summary, stats) {
            // Category chart
            const labels = summary.by_label?.map(l => l.label) || [];
            const counts = summary.by_label?.map(l => l.count) || [];

            if (categoryChart) categoryChart.destroy();
            categoryChart = new Chart(document.getElementById('categoryChart'), {
                type: 'doughnut',
                data: {
                    labels: labels.length ? labels : ['Нет данных'],
                    datasets: [{
                        data: counts.length ? counts : [1],
                        backgroundColor: ['#00d4aa', '#00a8ff', '#fbbf24', '#ef4444', '#8b5cf6', '#ec4899'],
                        borderWidth: 0
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
            document.getElementById('chartTotal').textContent = summary.total || 0;

            // Days chart
            const days = summary.by_day?.map(d => d.day.split('-').pop()) || [];
            const dayCounts = summary.by_day?.map(d => d.count) || [];

            if (daysChart) daysChart.destroy();
            daysChart = new Chart(document.getElementById('daysChart'), {
                type: 'bar',
                data: {
                    labels: days.length ? days : ['—'],
                    datasets: [{
                        data: dayCounts.length ? dayCounts : [0],
                        backgroundColor: '#00d4aa',
                        borderRadius: 6
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false, grid: { display: false } }, x: { grid: { display: false } } } }
            });
            document.getElementById('chartWeekTotal').textContent = dayCounts.reduce((a, b) => a + b, 0) || 0;
        }

        function renderSupportFilter() {
            const select = document.getElementById('supportFilter');
            select.innerHTML = '<option value="">Все саппорты</option>';
            supports.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.username;
                opt.textContent = `@${s.username}`;
                select.appendChild(opt);
            });

            const dutySelect = document.getElementById('dutySupportSelect');
            dutySelect.innerHTML = '<option value="">Выберите саппорта...</option>';
            supports.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.username;
                opt.textContent = `@${s.username}`;
                dutySelect.appendChild(opt);
            });
        }

        // ─── Filters ───────────────────────────────────────────
        function filterTickets() {
            currentStatus = document.getElementById('statusFilter').value;
            renderTickets();
        }

        function filterBySupport() {
            currentSupport = document.getElementById('supportFilter').value;
            renderTickets();
        }

        function changeWeek(delta) {
            weekOffset += delta;
            fetch(`${API}/api/schedule?offset=${weekOffset}`)
                .then(r => r.json())
                .then(renderSchedule);
        }

        // ─── Actions ────────────────────────────────────────────
        async function takeTicket(id) {
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '⏳';
            try {
                const r = await fetch(`${API}/api/tickets/${id}/take`, { method: 'POST' });
                if (r.ok) {
                    showToast(`Тикет #${id} взят`);
                    loadData();
                } else {
                    showError('Ошибка');
                    btn.disabled = false;
                }
            } catch (e) {
                showError(e.message);
                btn.disabled = false;
            }
        }

        async function closeTicket(id) {
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '⏳';
            try {
                const r = await fetch(`${API}/api/tickets/${id}/close`, { method: 'POST' });
                if (r.ok) {
                    showToast(`Тикет #${id} закрыт`);
                    loadData();
                } else {
                    showError('Ошибка');
                    btn.disabled = false;
                }
            } catch (e) {
                showError(e.message);
                btn.disabled = false;
            }
        }

        async function assignDuty() {
            const username = document.getElementById('dutySupportSelect').value;
            const shift = document.getElementById('dutyShiftSelect').value;
            if (!username) { showError('Выберите саппорта'); return; }
            try {
                const r = await fetch(`${API}/api/duty`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ support_username: username, shift })
                });
                if (r.ok) {
                    showToast(`@${username} назначен`);
                    loadData();
                }
            } catch (e) { showError(e.message); }
        }

        async function switchDuty() {
            if (!confirm('Сменить смену?')) return;
            try {
                const r = await fetch(`${API}/api/duty/switch`, { method: 'POST' });
                const d = await r.json();
                showToast(`Персменка! Оповещено: ${d.chats_notified || 0}`);
                loadData();
            } catch (e) { showError(e.message); }
        }

        // ─── Toast ──────────────────────────────────────────────
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast toast--success show';
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function showError(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast toast--error show';
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // ─── Init ───────────────────────────────────────────────
        loadData();
        setInterval(loadData, 30000);
    </script>
</body>
</html>
