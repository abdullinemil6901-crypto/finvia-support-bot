<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статистика — Finavia Support</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --bg-elevated: #0f0f12;
            --card: #18181b;
            --card-hover: #1f1f24;
            --border: rgba(255,255,255,0.05);
            --border-hover: rgba(255,255,255,0.1);
            --text: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #52525b;
            --accent: #8b5cf6;
            --accent-light: #a78bfa;
            --accent-dim: #6d28d9;
            --accent-glow: rgba(139, 92, 246, 0.25);
            --accent-glow-lg: rgba(139, 92, 246, 0.15);
            --green: #10b981;
            --yellow: #f59e0b;
            --cyan: #06b6d4;
            --red: #ef4444;
            --radius: 16px;
            --radius-sm: 12px;
            --radius-xs: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Manrope', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 32px 40px;
            -webkit-font-smoothing: antialiased;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xs);
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            margin-bottom: 28px;
        }
        .back-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow-lg);
        }
        .page-header {
            margin-bottom: 32px;
        }
        .page-header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }
        .page-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .support-stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            transition: all 0.3s ease;
        }
        .support-stat-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .support-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 20px;
        }
        .support-avatar {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), var(--cyan));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
        }
        .support-info h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 700;
        }
        .support-info p {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .support-metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .metric {
            text-align: center;
            padding: 12px;
            background: var(--bg);
            border-radius: var(--radius-xs);
        }
        .metric-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-light);
        }
        .metric-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <a href="/dashboard" class="back-btn">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <polyline points="15 18 9 12 15 6"/>
        </svg>
        Назад к дашборду
    </a>

    <div class="page-header">
        <h1>Статистика саппортов</h1>
        <p>Детальная статистика работы каждого саппорта</p>
    </div>

    <div class="stats-grid" id="statsGrid">
        <div class="loading">Загрузка...</div>
    </div>

    <script>
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const stats = await response.json();
                const supportsRes = await fetch('/api/supports');
                const supports = await supportsRes.json();

                const grid = document.getElementById('statsGrid');

                if (!stats.length) {
                    grid.innerHTML = '<div class="loading">Нет данных</div>';
                    return;
                }

                grid.innerHTML = stats.map(s => {
                    const support = supports.find(sp => sp.username === s.username) || {};
                    const avgTime = s.avg_seconds ? `${Math.round(s.avg_seconds / 60)} мин` : '—';

                    return `<div class="support-stat-card">
                        <div class="support-header">
                            <div class="support-avatar">${(s.username || '?').charAt(0).toUpperCase()}</div>
                            <div class="support-info">
                                <h3>@${s.username}</h3>
                                <p>${support.full_name || 'Саппорт'}</p>
                            </div>
                        </div>
                        <div class="support-metrics">
                            <div class="metric">
                                <div class="metric-value">${s.total || 0}</div>
                                <div class="metric-label">Всего</div>
                            </div>
                            <div class="metric">
                                <div class="metric-value">${s.closed || 0}</div>
                                <div class="metric-label">Закрыто</div>
                            </div>
                            <div class="metric">
                                <div class="metric-value">${avgTime}</div>
                                <div class="metric-label">Ср. время</div>
                            </div>
                        </div>
                    </div>`;
                }).join('');

            } catch (e) {
                document.getElementById('statsGrid').innerHTML = '<div class="loading">Ошибка загрузки</div>';
            }
        }

        loadStats();
    </script>
</body>
</html>
